name: Release & Publish to npm

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Build, Test & Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Caddy CLI
        run: |
          sudo apt-get install -y debian-keyring debian-archive-keyring apt-transport-https curl
          curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/gpg.key' | sudo gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg
          curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt' | sudo tee /etc/apt/sources.list.d/caddy-stable.list
          sudo apt-get update
          sudo apt-get install -y caddy

      - name: Run type check
        run: bun run typecheck

      - name: Run linter
        run: bun run lint

      - name: Build package
        run: bun run build

      - name: Run unit tests
        run: bun run test

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Setup Node.js for npm publishing
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      # Trusted publishing uses OIDC - no NPM_TOKEN needed
      # Configure at: npmjs.com → Package Settings → Trusted Publishers
      #
      # Pin npm to a known-good version: hosted-runner Node 22.22.2 ships
      # a corrupt pre-installed npm (`@npmcli/arborist` missing
      # `promise-retry`), which crashes any plain `npm install -g npm@*`
      # before it can reify. `--force` skips the broken local install
      # script. Trusted publishing via OIDC requires npm >= 11.5.1.
      - name: Update npm for trusted publishing
        run: npm install -g --force npm@11

      - name: Publish to npm (Trusted Publishing via OIDC)
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          generateReleaseNotes: true
          makeLatest: true
          allowUpdates: true
