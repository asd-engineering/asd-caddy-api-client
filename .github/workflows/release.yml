name: Release & Publish to npm

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Build, Test & Publish to npm
    runs-on: ${{ vars.LINUX_RUNNER || 'ubuntu-latest' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Caddy CLI
        run: |
          sudo apt-get install -y debian-keyring debian-archive-keyring apt-transport-https curl
          curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/gpg.key' | sudo gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg
          curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt' | sudo tee /etc/apt/sources.list.d/caddy-stable.list
          sudo apt-get update
          sudo apt-get install -y caddy

      - name: Run type check
        run: bun run typecheck

      - name: Run linter
        run: bun run lint

      - name: Build package
        run: bun run build

      - name: Run unit tests
        run: bun run test

      - name: Verify package contents
        run: npm pack --dry-run

      # Pinned to Node 20 LTS to avoid Node 22.22.2 hosted-runner image,
      # whose pre-installed npm ships a corrupt `@npmcli/arborist` (missing
      # `promise-retry`) that crashes any `npm install -g`. Node 20 ships
      # with a working npm we can upgrade in place to >= 11.5.1 (required
      # for OIDC trusted publishing).
      - name: Setup Node.js for npm publishing
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      # Trusted publishing uses OIDC - no NPM_TOKEN needed.
      # Configure at: npmjs.com → Package Settings → Trusted Publishers
      - name: Update npm for trusted publishing
        run: npm install -g npm@11


      - name: Publish to npm (Trusted Publishing via OIDC)
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          generateReleaseNotes: true
          makeLatest: true
          allowUpdates: true
